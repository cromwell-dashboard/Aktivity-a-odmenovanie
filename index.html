@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');

.app {
  --blue: #3A52C9;
  --blue-dark: #2B3DA0;
  --blue-light: #8A98DF;
  --blue-soft: #E8EAFA;
  --ink: #33363F;
  --ink-soft: #6B6E78;
  --paper: #F3F4F6;
  --surface: #FFFFFF;
  --line: #E2E3E8;
  --green: #3F9C6D;
  --green-soft: #E5F4ED;
  --amber: #D98C3A;
  --amber-soft: #FBEEDD;
  --red: #D1493C;
  --red-soft: #FBE7E4;
  --navy-soft: #E8EAFA;
  --slate: #8A8D97;
  --slate-soft: #EEEFF2;
  --shadow: 0 1px 2px rgba(40,48,80,0.05), 0 6px 18px rgba(40,48,80,0.06);
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  padding: 22px;
  box-sizing: border-box;
}
.app * { box-sizing: border-box; }
.app table { font-family: 'Inter', system-ui, sans-serif; }
.mono, .input-cell.mono { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12.5px; }

.loader-screen {
  display: flex; align-items: center; justify-content: center;
  height: 60vh; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 18px; color: var(--ink-soft);
}

/* ---- header ---- */
.topbar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  background: var(--paper); padding: 8px 22px;
  margin: -22px -22px 16px -22px;
  border-bottom: 1px solid var(--line);
  box-shadow: 0 2px 8px rgba(40,48,80,0.06);
}
.topbar-month-filter {
  display: flex; align-items: center; gap: 6px;
  flex: 1; justify-content: flex-end; flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: 14px; }
.brand-logo { height: 34px; width: auto; display: block; }
.brand-divider { width: 1px; height: 30px; background: var(--line); }
.brand-title { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 19px; line-height: 1.2; color: var(--ink); }
.brand-sub { font-size: 12.5px; color: var(--ink-soft); margin-top: 1px; }

.tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--line); border-radius: 11px; padding: 4px; }
.tab {
  border: none; background: transparent; padding: 8px 16px; border-radius: 8px;
  font-size: 13.5px; font-weight: 600; color: var(--ink-soft); cursor: pointer;
  transition: all 0.15s ease; font-family: inherit;
}
.tab:hover { background: var(--paper); }
.tab-active { background: var(--blue); color: #fff; }
.tab-weekly { color: #1F7A54; }
.tab-weekly.tab-active { background: #1F7A54; color: #fff; }
.wk-panel { --wk: #1F7A54; --wk-soft: #E4F3EC; }
.wk-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; background: var(--wk-soft); border: 1px solid #Bfe0cf; border-left: 4px solid var(--wk); border-radius: 12px; padding: 14px 18px; }
.wk-title { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 20px; color: var(--wk); }
.wk-range { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
.wk-now { font-size: 11px; font-weight: 700; color: var(--wk); background: #fff; border: 1px solid #Bfe0cf; border-radius: 20px; padding: 1px 9px; margin-left: 8px; }
.wk-nav { display: flex; gap: 6px; flex-wrap: wrap; }
.wk-deltas { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; }
.wk-delta-card { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 10px 14px; font-size: 12.5px; color: var(--ink-soft); }
.wk-delta { font-weight: 700; }
.wk-up { color: #1F7A54; }
.wk-down { color: var(--red); }
.wk-flat { color: var(--slate); }
.wk-pill-count { font-size: 12px; font-weight: 700; color: var(--wk); background: var(--wk-soft); border-radius: 20px; padding: 1px 9px; margin-left: 6px; }
.wk-pend-list { display: flex; flex-direction: column; gap: 6px; }
.wk-pend-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; background: var(--paper); border-radius: 8px; }
.wk-pend-cli { flex: 1; font-size: 12.5px; font-weight: 600; color: var(--ink); }
.wk-pend-sum { font-weight: 700; color: var(--wk); font-size: 13px; }
.hbar-row-hover { cursor: pointer; border-radius: 6px; transition: background 0.12s; }
.hbar-row-hover:hover { background: var(--paper); }
.hbar-row-active { background: var(--wk-soft, var(--blue-soft)); }
.wk-side { display: flex; flex-direction: column; gap: 14px; }
.wk-hint { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-soft); background: var(--wk-soft); border: 1px dashed #Bfe0cf; border-radius: 8px; padding: 8px 12px; }
.wk-trend { display: flex; align-items: flex-end; justify-content: space-between; gap: 8px; height: 130px; padding: 6px 4px 0; }
.wk-trend-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; height: 100%; justify-content: flex-end; }
.wk-trend-val { font-size: 12px; font-weight: 700; color: var(--ink); }
.wk-trend-bar { width: 70%; max-width: 38px; background: #9CC6B2; border-radius: 5px 5px 0 0; min-height: 6px; }
.wk-trend-cur .wk-trend-bar { background: var(--wk); }
.wk-trend-cur .wk-trend-val { color: var(--wk); }
.wk-trend-lbl { font-size: 10.5px; color: var(--slate); white-space: nowrap; }
.wk-trend-card { padding-bottom: 10px; }
.wk-line { display: block; overflow: visible; }
.wk-trend-grid { align-items: stretch; }
.wk-sum { display: flex; flex-direction: column; gap: 2px; margin-top: 4px; }
.wk-sum-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 4px; border-bottom: 1px solid var(--paper); }
.wk-sum-row:last-child { border-bottom: none; }
.wk-sum-lbl { font-size: 12.5px; color: var(--ink-soft); }
.wk-sum-val { font-size: 18px; font-weight: 700; color: var(--wk); font-family: 'Poppins', sans-serif; }
.wk-sum-val.sm { font-size: 13px; font-weight: 600; color: var(--ink); }
.wk-svc-filter { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
.wk-svc-flabel { font-size: 11px; font-weight: 700; color: var(--slate); text-transform: uppercase; letter-spacing: 0.03em; margin-right: 2px; }
.wk-svc-btn { --svc-color: #7C8590; display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px; cursor: pointer; font-family: inherit; border: 1.5px solid color-mix(in srgb, var(--svc-color) 35%, white); background: #fff; color: var(--svc-color); opacity: 0.7; transition: all 0.12s; }
.wk-svc-btn:hover { opacity: 1; }
.wk-svc-btn.on { background: color-mix(in srgb, var(--svc-color) 16%, white); border-color: var(--svc-color); opacity: 1; }
.wk-svc-clear { font-size: 11px; color: var(--slate); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: inherit; }
.kpi-click { cursor: pointer; transition: box-shadow 0.12s, transform 0.12s; }
.kpi-click:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
.kpi-active { outline: 2px solid var(--amber); outline-offset: 1px; }
.client-list-card { margin-top: 14px; border-top: 3px solid var(--blue); }
.client-list-card .card-title-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.svc-clients { margin: 12px 0 4px; padding: 10px; background: var(--paper); border-radius: 10px; border: 1px solid var(--line); }
.svc-clients-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.svc-clients-x { border: none; background: none; font-size: 18px; line-height: 1; color: var(--slate); cursor: pointer; padding: 0 4px; }
.svc-clients-x:hover { color: var(--red); }
.svc-clients-list { display: flex; flex-direction: column; gap: 4px; max-height: 340px; overflow-y: auto; }
.svc-cli { background: var(--surface); border-radius: 8px; border: 1px solid var(--line); }
.svc-cli-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; cursor: pointer; }
.svc-cli-row:hover { background: var(--blue-soft); }
.svc-cli-date { font-size: 11px; color: var(--slate); font-variant-numeric: tabular-nums; white-space: nowrap; }
.svc-cli-name { flex: 1; font-size: 12.5px; font-weight: 600; color: var(--ink); }
.svc-cli-exp { padding: 8px 12px 12px; border-top: 1px dashed var(--line); }
.svc-cli-meta { display: flex; flex-wrap: wrap; gap: 4px 16px; font-size: 11.5px; color: var(--ink-soft); margin-bottom: 6px; }
.svc-cli-popis { font-size: 12.5px; color: var(--ink); line-height: 1.5; margin: 4px 0 0; white-space: pre-wrap; }

/* ---- month bar ---- */
.month-bar {
  display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
  color: var(--ink-soft); flex-wrap: wrap;
}
.month-bar-label { font-size: 12.5px; font-weight: 600; }
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  border: 1px solid var(--line); background: var(--surface); color: var(--ink-soft);
  border-radius: 999px; padding: 5px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all 0.15s ease;
}
.chip:hover { border-color: var(--ink-soft); }
.chip-active { background: var(--blue); color: #fff; border-color: var(--blue); }

/* ---- layout helpers ---- */
.main { display: flex; flex-direction: column; gap: 18px; }
.tab-panel { display: flex; flex-direction: column; gap: 18px; }
.grid-kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.nb-sticky-kpi {
  position: sticky; top: 57px; z-index: 40;
  background: var(--paper); padding: 12px 0 10px;
  margin: -8px 0 4px;
  border-bottom: 1px solid var(--line);
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
@media (max-width: 1500px) { .app { zoom: 0.92; padding: 18px; } }
@media (max-width: 1300px) { .app { zoom: 0.84; padding: 14px; } }
@media (max-width: 1150px) { .app { zoom: 0.76; padding: 12px; } }
@media (max-width: 1000px) { .app { zoom: 0.7; padding: 10px; } }

.card {
  background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
  padding: 18px; box-shadow: var(--shadow);
}
.section-title {
  font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 15px;
  margin-bottom: 12px; color: var(--blue);
}
.info-line {
  display: flex; align-items: flex-start; gap: 6px; font-size: 12px; color: var(--ink-soft);
  background: var(--paper); border: 1px dashed var(--line); border-radius: 8px;
  padding: 8px 10px; margin-bottom: 14px; line-height: 1.5;
}

.kpi-card {
  position: relative; background: var(--surface); border: 1px solid var(--line);
  border-left: 3px solid var(--blue); border-radius: 10px; padding: 16px 16px 14px; box-shadow: var(--shadow);
}
.kpi-top { display: flex; align-items: center; justify-content: space-between; color: var(--slate); margin-bottom: 8px; }
.kpi-label { font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
.kpi-value { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 24px; color: var(--ink); line-height: 1.1; }
.kpi-sub { font-size: 11.5px; color: var(--slate); margin-top: 3px; }
.kpi-green .kpi-value { color: var(--green); }
.kpi-amber .kpi-value { color: var(--amber); }

/* ---- filters ---- */
.filters-card { padding: 14px 16px; }
.filters-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.filter-field { display: flex; flex-direction: column; gap: 3px; }
.filter-field-btn { justify-content: flex-end; }
.filter-label { font-size: 10.5px; font-weight: 600; color: var(--slate); text-transform: uppercase; letter-spacing: 0.03em; padding-left: 2px; }
.ms-wrap { position: relative; }
.ms-toggle { display: flex; align-items: center; justify-content: space-between; gap: 8px; min-width: 130px; cursor: pointer; text-align: left; }
.ms-caret { font-size: 9px; color: var(--slate); }
.ms-popover { position: absolute; top: calc(100% + 4px); left: 0; z-index: 45; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; box-shadow: var(--shadow); padding: 8px; min-width: 200px; max-height: 280px; overflow-y: auto; }
.ms-row { display: flex; align-items: center; gap: 8px; padding: 4px 6px; border-radius: 6px; cursor: pointer; }
.ms-row:hover { background: var(--paper); }
.ms-clear { width: 100%; text-align: left; border: none; background: none; font-size: 11.5px; color: var(--slate); cursor: pointer; padding: 4px 6px; font-family: inherit; border-bottom: 1px solid var(--line); margin-bottom: 4px; }
.ms-clear:hover { color: var(--blue); }
.ms-done { width: 100%; justify-content: center; margin-top: 6px; }
.filters-spacer { flex: 1; }
.filters-hint { font-size: 11.5px; color: var(--slate); margin-top: 8px; }
.search-wrap {
  display: flex; align-items: center; gap: 6px; border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; background: var(--paper); color: var(--slate);
  width: 150px; flex: none;
}
.input-bare {
  border: none; background: transparent; outline: none; font-size: 13px;
  color: var(--ink); width: 100%; font-family: inherit;
}
.select, .input {
  border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px;
  font-size: 13px; font-family: inherit; background: var(--surface); color: var(--ink);
}
.select-sm { font-size: 12.5px; padding: 6px 8px; }

/* ---- buttons ---- */
.btn {
  display: inline-flex; align-items: center; gap: 6px; border-radius: 8px;
  border: 1px solid transparent; padding: 8px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all 0.15s ease; white-space: nowrap;
}
.btn-primary { background: var(--blue); color: #fff; }
.btn-primary:hover { background: var(--blue-dark); }
.btn-ghost { background: var(--surface); color: var(--ink-soft); border-color: var(--line); }
.btn-ghost:hover { background: var(--paper); }
.btn-sm { padding: 6px 11px; font-size: 12.5px; }
.btn-xs { padding: 4px 9px; font-size: 11.5px; border-radius: 6px; }
.btn-icon {
  border: none; background: transparent; color: var(--slate); cursor: pointer;
  padding: 4px; border-radius: 6px; display: inline-flex; align-items: center;
}
.btn-icon:hover { background: var(--red-soft); color: var(--red); }
.deal-add-btn { width: 100%; justify-content: center; margin-top: 10px; }
.add-month-row { display: flex; gap: 6px; margin-top: 10px; align-items: center; }
.add-month-row .input-cell.mono { width: auto; flex: 1; border-color: var(--line); }
.add-month-form { margin-top: 10px; border-top: 1px dashed var(--line); padding-top: 10px; }
.add-month-header { font-size: 11px; font-weight: 600; color: var(--slate); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
.add-month-fields { display: flex; gap: 6px; flex-wrap: wrap; }
.add-month-field { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 70px; }
.add-month-field label { font-size: 10.5px; color: var(--slate); font-weight: 600; }
.add-month-field .input-cell { width: 100%; border-color: var(--line); }
.add-month-preview { font-size: 11.5px; color: var(--ink-soft); margin-top: 6px; }
.add-month-preview strong { color: var(--green); }
.add-month-actions { display: flex; gap: 6px; margin-top: 8px; }
.action-stack { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }

/* ---- table ---- */
.table-card { padding: 16px; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px;
  color: var(--slate); font-weight: 600; padding: 8px 10px; border-bottom: 2px solid var(--line);
  white-space: nowrap;
}
td { padding: 9px 10px; border-bottom: 1px solid var(--line); vertical-align: middle; white-space: nowrap; }
tr.row-clickable { cursor: pointer; }
tr.row-clickable:hover td { background: var(--paper); }
.cell-strong { font-weight: 600; color: var(--ink); }
.cell-muted { opacity: 0.55; }
.dim { color: var(--slate); font-size: 12px; }
.warn-icon { color: var(--red); margin-left: 5px; vertical-align: -2px; }
.odmena-cell { display: flex; align-items: center; gap: 4px; }
.odmena-input { width: 80px; }
.odmena-toggle-icon {
  border: none; background: none; padding: 2px; cursor: pointer; color: var(--slate);
  border-radius: 4px; display: inline-flex; align-items: center; opacity: 0.4;
  transition: opacity 0.15s;
}
.odmena-toggle-icon:hover { opacity: 1; color: var(--blue); }
.odmena-toggle-icon.odmena-toggle-active { opacity: 1; color: var(--blue); }
.empty-state { text-align: center; color: var(--slate); padding: 26px 10px; font-size: 13px; white-space: normal; }

.row-expand td { background: var(--paper); white-space: normal; }
.expand-box { padding: 6px 4px; }
.expand-grid { display: flex; gap: 22px; flex-wrap: wrap; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 8px; }
.expand-label { font-weight: 600; color: var(--ink); }
.expand-popis { font-size: 13px; color: var(--ink-soft); white-space: pre-wrap; line-height: 1.55; max-width: 900px; }
.historia-box { margin-top: 10px; padding: 10px 12px; background: var(--paper); border-radius: 8px; border: 1px solid var(--line); max-width: 900px; }
.historia-badge { display: inline-block; margin-left: 8px; font-size: 10px; font-weight: 700; color: var(--blue); background: var(--blue-soft); border-radius: 10px; padding: 1px 7px; vertical-align: middle; }
.historia-title { font-size: 11px; font-weight: 700; color: var(--slate); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
.historia-step { position: relative; padding-left: 16px; padding-bottom: 10px; border-left: 2px solid var(--line); margin-left: 4px; }
.historia-step:last-child { border-left-color: transparent; padding-bottom: 0; }
.historia-step-head { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
.historia-step-dot { position: absolute; left: -5px; top: 3px; width: 8px; height: 8px; border-radius: 50%; background: var(--blue); }
.historia-step-date { font-size: 12px; font-weight: 700; color: var(--blue-dark); }
.historia-step-tag { font-size: 10px; color: var(--slate); background: #fff; border: 1px solid var(--line); border-radius: 4px; padding: 0 6px; }
.historia-step-popis { font-size: 12.5px; color: var(--ink-soft); white-space: pre-wrap; line-height: 1.5; margin: 2px 0 0 0; }

.input-cell {
  border: 1px solid transparent; background: transparent; border-radius: 6px;
  padding: 4px 6px; font-size: 13px; width: 90px; font-family: inherit; color: var(--ink);
}
.input-cell:hover { border-color: var(--line); }
.input-cell:focus { border-color: var(--ink-soft); background: var(--paper); outline: none; }
.input-cell.mono { width: 122px; }
.input-cell.input-date {
  width: 110px; opacity: 0; position: absolute; cursor: pointer;
}
td .datum-display { font-size: 12.5px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; cursor: pointer; white-space: nowrap; }
td:has(.input-date) { position: relative; min-width: 90px; }
td:has(.input-date):hover .datum-display { text-decoration: underline; color: var(--blue); }
.input-cell.sposob { width: 140px; }
.input-cell.vyrad-dovod { width: 100%; min-width: 150px; margin-top: 4px; background: var(--slate-soft); }
.correction-note { font-size: 10.5px; color: var(--amber); margin: 2px 0 0 6px; font-style: italic; }
.btn-link-sm {
  display: block; border: none; background: none; padding: 3px 0 0; margin: 0;
  font-size: 10.5px; color: var(--slate); cursor: pointer; text-decoration: underline;
  font-family: inherit;
}
.btn-link-sm:hover { color: var(--ink-soft); }
.wrap-cell { white-space: normal !important; word-break: break-word; max-width: 130px; line-height: 1.35; }
.sluzby-cell { max-width: 150px; }
.tag-wrap-editable { cursor: pointer; min-height: 20px; border-radius: 6px; padding: 2px; }
.tag-wrap-editable:hover { background: var(--paper); outline: 1px dashed var(--line); }
.sluzby-popover {
  position: absolute; top: calc(100% + 2px); left: 0; z-index: 40;
  background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
  box-shadow: var(--shadow); padding: 10px 12px; width: 200px;
}
.sluzby-popover-row {
  display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--ink);
  padding: 4px 0; cursor: pointer; white-space: nowrap;
}
.sluzby-popover-done { width: 100%; justify-content: center; margin-top: 6px; }
.status-cell { display: flex; align-items: center; gap: 2px; }
.btn-icon-restore:hover { background: var(--green-soft); color: var(--green); }

/* ---- service tags ---- */
.tag-wrap { display: flex; gap: 5px; flex-wrap: wrap; }
.svc-tag {
  --svc-color: #7C8590;
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 999px;
  background: color-mix(in srgb, var(--svc-color) 14%, white);
  color: var(--svc-color); white-space: nowrap;
}
/* Adresn\xE9 / Neadresn\xE9 doru\u010Dovanie \u2014 zalomi\u0165 v st\u013Apci detail tabu\u013Eky */
td .svc-tag { white-space: normal; word-break: break-word; max-width: 130px; }

/* ---- badges ---- */
.badge { display: inline-block; font-size: 11.5px; font-weight: 600; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
.badge-green { background: var(--green-soft); color: var(--green); }
.badge-amber { background: var(--amber-soft); color: var(--amber); }
.badge-navy { background: var(--blue-soft); color: var(--blue); }
.badge-slate { background: var(--slate-soft); color: var(--slate); }
.badge-red { background: var(--red-soft); color: var(--red); }

/* ---- deal cards / New Business ---- */
.deal-grid { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-start; }
.deal-grid .deal-card { flex: 0 0 auto; min-width: 240px; }
.deal-card {
  border: 1px solid var(--line); border-radius: 12px; padding: 14px;
  background: var(--paper); display: flex; flex-direction: column; gap: 8px;
}
.deal-card-highlight {
  border-color: var(--red) !important;
  box-shadow: 0 0 0 2px rgba(220,53,69,0.25);
  animation: highlight-fade 4s ease forwards;
}
@keyframes highlight-fade {
  0% { border-color: var(--red); box-shadow: 0 0 0 2px rgba(220,53,69,0.25); }
  80% { border-color: var(--red); box-shadow: 0 0 0 2px rgba(220,53,69,0.1); }
  100% { border-color: var(--line); box-shadow: none; }
}
